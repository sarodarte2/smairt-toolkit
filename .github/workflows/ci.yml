name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: ruff format --check src tests scripts
      - run: ruff check src tests scripts
      - run: mypy src/smairt
      - run: >-
          python -m pytest --cov=smairt --cov-branch --cov-report=term-missing
          --cov-report=json:coverage.json
      - run: python scripts/check_critical_coverage.py

  dependency-range:
    strategy:
      matrix:
        resolution: [minimum, latest]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - if: matrix.resolution == 'minimum'
        run: >-
          python -m pip install
          'pydantic==2.8.*' 'pyyaml==6.0.*' 'rich==13.9.*' 'textual==1.0.*'
          'typer==0.15.*' 'pypdf==5.0.*' 'python-docx==1.1.*'
      - if: matrix.resolution == 'latest'
        run: python -m pip install --upgrade .
      - if: matrix.resolution == 'minimum'
        run: python -m pip install --no-deps .
      - run: python -m pip install 'pytest>=8.3' 'hypothesis>=6.135'
      - run: python -m pip check
      - run: smairt --version
      - run: python -m pytest -p no:cacheprovider

  package-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python -m venv "$RUNNER_TEMP/wheel-smoke"
      - run: >-
          "$RUNNER_TEMP/wheel-smoke/bin/pip" install dist/smairt-*.whl
      - run: >-
          "$RUNNER_TEMP/wheel-smoke/bin/smairt" --version
      - run: >-
          "$RUNNER_TEMP/wheel-smoke/bin/smairt" new "$RUNNER_TEMP/smoke-project"
          --name "Package Smoke" --author "CI Researcher" --confirm-contributor
          --classification unpublished --no-git
      - run: >-
          "$RUNNER_TEMP/wheel-smoke/bin/smairt" doctor --json
        working-directory: ${{ runner.temp }}/smoke-project
      - run: >-
          "$RUNNER_TEMP/wheel-smoke/bin/smairt" harness select zoo
        working-directory: ${{ runner.temp }}/smoke-project
      - run: >-
          "$RUNNER_TEMP/wheel-smoke/bin/smairt" harness select cline
        working-directory: ${{ runner.temp }}/smoke-project
      - run: >-
          "$RUNNER_TEMP/wheel-smoke/bin/smairt" harness select codex
        working-directory: ${{ runner.temp }}/smoke-project

  readme-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: python -m pip install .
      - run: >-
          smairt new "$RUNNER_TEMP/readme-study" --name "README Study"
          --author "CI Researcher" --confirm-contributor --classification unpublished --no-git
      - run: smairt status --json
        working-directory: ${{ runner.temp }}/readme-study
      - run: smairt next --json
        working-directory: ${{ runner.temp }}/readme-study
      - run: smairt doctor --json
        working-directory: ${{ runner.temp }}/readme-study
