name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  documentation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Validate documentation structure and repository metadata
        run: python scripts/validate_docs.py
      - name: Check external documentation links
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: >-
            --no-progress --max-retries 2 --retry-wait-time 2
            './**/*.md'

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: ruff format --check src tests scripts
      - run: ruff check src tests scripts
      - run: mypy src/smairt
      - run: python -m pytest -p no:cacheprovider

  dependency-range:
    strategy:
      fail-fast: false
      matrix:
        resolution: [minimum, latest]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - if: matrix.resolution == 'minimum'
        run: >-
          python -m pip install
          'click==8.1.*' 'pydantic==2.11.*' 'prompt-toolkit==3.0.52'
          'pyyaml==6.0.*' 'rich==13.9.*'
          'typer==0.15.*' 'pypdf==5.0.*' 'python-docx==1.1.*'
          'keyring==25.7.*' 'pyzotero==1.13.*' 'mcp==1.28.*'
          'httpx==0.28.*' 'platformdirs==4.3.*'
      - if: matrix.resolution == 'latest'
        run: python -m pip install --upgrade .
      - if: matrix.resolution == 'minimum'
        run: python -m pip install --no-deps .
      - run: python -m pip install 'pytest>=8.3' 'hypothesis>=6.135'
      - run: python -m pip check
      - run: smairt --version
      - run: python -m pytest -p no:cacheprovider

  package-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python -m venv "$RUNNER_TEMP/wheel-smoke"
      - run: >-
          "$RUNNER_TEMP/wheel-smoke/bin/pip" install dist/smairt-*.whl
      - run: >-
          "$RUNNER_TEMP/wheel-smoke/bin/smairt" --version
      - run: >-
          "$RUNNER_TEMP/wheel-smoke/bin/smairt" setup doctor --json
      - run: >-
          "$RUNNER_TEMP/wheel-smoke/bin/smairt" new "$RUNNER_TEMP/smoke-project"
          --name "Package Smoke" --author "CI Researcher" --confirm-contributor
          --classification unpublished --no-git
      - run: "$RUNNER_TEMP/wheel-smoke/bin/smairt status --json"
        working-directory: ${{ runner.temp }}/smoke-project
      - run: "$RUNNER_TEMP/wheel-smoke/bin/smairt next --json"
        working-directory: ${{ runner.temp }}/smoke-project
      - run: >-
          "$RUNNER_TEMP/wheel-smoke/bin/smairt" doctor --json
        working-directory: ${{ runner.temp }}/smoke-project
      - run: "$RUNNER_TEMP/wheel-smoke/bin/smairt integration openalex status --json"
        working-directory: ${{ runner.temp }}/smoke-project
      - run: "$RUNNER_TEMP/wheel-smoke/bin/smairt mcp enable --harness codex"
        working-directory: ${{ runner.temp }}/smoke-project
      - run: "$RUNNER_TEMP/wheel-smoke/bin/smairt mcp disable --harness codex"
        working-directory: ${{ runner.temp }}/smoke-project
      - run: >-
          "$RUNNER_TEMP/wheel-smoke/bin/python" -c
          "from pathlib import Path; import yaml; p=Path('smairt.yaml'); d=yaml.safe_load(p.read_text()); d['schema_version']=3; d.pop('integrations'); p.write_text(yaml.safe_dump(d, sort_keys=False))"
        working-directory: ${{ runner.temp }}/smoke-project
      - run: "$RUNNER_TEMP/wheel-smoke/bin/smairt migrate apply --allow-dirty"
        working-directory: ${{ runner.temp }}/smoke-project
      - run: >-
          "$RUNNER_TEMP/wheel-smoke/bin/smairt" harness select zoo
        working-directory: ${{ runner.temp }}/smoke-project
      - run: >-
          "$RUNNER_TEMP/wheel-smoke/bin/smairt" harness select cline
        working-directory: ${{ runner.temp }}/smoke-project
      - run: >-
          "$RUNNER_TEMP/wheel-smoke/bin/smairt" harness select codex
        working-directory: ${{ runner.temp }}/smoke-project

  readme-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: python -m pip install .
      - run: >-
          smairt new "$RUNNER_TEMP/readme-study" --name "README Study"
          --author "CI Researcher" --confirm-contributor --classification unpublished --no-git
      - run: smairt status --json
        working-directory: ${{ runner.temp }}/readme-study
      - run: smairt next --json
        working-directory: ${{ runner.temp }}/readme-study
      - run: smairt doctor --json
        working-directory: ${{ runner.temp }}/readme-study

  uv-tool-smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: uv tool install --python 3.11 .
      - run: '"$(uv tool dir --bin)/smairt" --version'
      - run: '"$(uv tool dir --bin)/smairt" setup doctor --json'
      - run: >-
          "$(uv tool dir --bin)/smairt" new "$RUNNER_TEMP/uv-smoke-project"
          --name "uv Smoke" --author "CI Researcher" --confirm-contributor
          --classification unpublished --no-git
      - run: '"$(uv tool dir --bin)/smairt" integration openalex status --json'
        working-directory: ${{ runner.temp }}/uv-smoke-project
      - run: '"$(uv tool dir --bin)/smairt" mcp enable --harness codex'
        working-directory: ${{ runner.temp }}/uv-smoke-project
      - run: '"$(uv tool dir --bin)/smairt" mcp disable --harness codex'
        working-directory: ${{ runner.temp }}/uv-smoke-project
      - run: >-
          "$(uv tool dir)/smairt/bin/python" -c
          "from pathlib import Path; import yaml; p=Path('smairt.yaml'); d=yaml.safe_load(p.read_text()); d['schema_version']=3; d.pop('integrations'); p.write_text(yaml.safe_dump(d, sort_keys=False))"
        working-directory: ${{ runner.temp }}/uv-smoke-project
      - run: '"$(uv tool dir --bin)/smairt" migrate apply --allow-dirty'
        working-directory: ${{ runner.temp }}/uv-smoke-project
