name: GitHub Release

on:
  push:
    tags:
      - "v*-beta.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip build pip-audit
      - run: python -m build
      - name: Test wheel and version-tag coherence
        run: |
          python -m venv "$RUNNER_TEMP/release-wheel"
          "$RUNNER_TEMP/release-wheel/bin/pip" install dist/smairt-*.whl
          EXPECTED_TAG=$("$RUNNER_TEMP/release-wheel/bin/python" -c 'import importlib.metadata, re; value=importlib.metadata.version("smairt"); print("v" + re.sub(r"b([0-9]+)$", r"-beta.\1", value))')
          test "$GITHUB_REF_NAME" = "$EXPECTED_TAG"
          "$RUNNER_TEMP/release-wheel/bin/smairt" --version
          "$RUNNER_TEMP/release-wheel/bin/smairt" new "$RUNNER_TEMP/release-project" --name "Release Smoke" --author "Release CI" --confirm-contributor --no-git
          cd "$RUNNER_TEMP/release-project"
          "$RUNNER_TEMP/release-wheel/bin/smairt" doctor --json
      - name: Test the source distribution independently
        run: |
          python -m venv "$RUNNER_TEMP/release-sdist"
          "$RUNNER_TEMP/release-sdist/bin/pip" install dist/smairt-*.tar.gz
          "$RUNNER_TEMP/release-sdist/bin/smairt" --version
      - name: Generate runtime SBOM and checksums
        run: |
          python -m venv "$RUNNER_TEMP/audit-tool"
          "$RUNNER_TEMP/audit-tool/bin/pip" install pip-audit
          SITE_PACKAGES=$("$RUNNER_TEMP/release-wheel/bin/python" -c 'import sysconfig; print(sysconfig.get_path("purelib"))')
          "$RUNNER_TEMP/audit-tool/bin/pip-audit" --path "$SITE_PACKAGES" --format cyclonedx-json --output dist/sbom.cdx.json
          cd dist
          find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: github-release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-dist
          path: dist
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
            dist/sbom.cdx.json
            dist/SHA256SUMS
      - name: Publish GitHub Release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" dist/*
          --verify-tag --generate-notes --prerelease
